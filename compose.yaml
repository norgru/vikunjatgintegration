services:
  vikunja-telegram:
    build: .
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    mem_limit: 128m
    cpus: 0.50
    env_file: .env
    networks:
      - vikunja
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  vikunja:
    external: true
    name: ${VIKUNJA_DOCKER_NETWORK:-vikunja_default}
